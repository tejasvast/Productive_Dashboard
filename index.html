<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
</head>
<body data-theme="dark">
    
    <nav class="card">
        <h1 id="title">Dashboard</h1>

        <button id="themeBtn">
            <i class="ri-moon-line"></i>
        </button>
    </nav>

    <main id="dashboard">
        <div class="info">
        <div class="summary card">
        <div class="datetime">
            <div id="day"></div>
          <div id="time"></div>
        </div>

        <div id="temp">

          </div>
        </div>
        <div class="quote card">
                <h6>Daily Quote</h6>
                <p id= "Dailyquote"></p>
                <h5 id = "author">-author name</h6>
        </div>
        </div>
        <div class="allcard">
             <div class="task card" id="goalCard">
                <div class="top">
                    <span><i class="ri-focus-2-line"></i></span>
                    <h3>Daily Goals</h3>
                </div>
            </div>


            <div class="task card" id="todocard">
                <div class="top">
                    <span><i class="ri-todo-line"></i></span>
                    <h3>To-Do list</h3>
                </div>
            </div>


            <div class="task card" id="pomodoroCard">
                <div class="top">
                    <span><i class="ri-timer-line"></i></span>
                    <h3>Focus Timer</h3>
                </div>
            </div>
        </div>
    </main>



    <section id="goalPage" class="page">
    
        <button id="backGoal" class="backBtn">
            <i class="ri-arrow-left-line"></i>
            Back
        </button>
    
    
        <div class="goal-container">
    
            <input type="text" id="goalInput" placeholder="Enter Goal">
    
            <button id="addGoal">
                Add Goal
            </button>
    
            
    
        </div>

        <div class="goals">
            <ul id="goalList"></ul>
        </div>
       
    
    </section>

    <div id ='todo_page' class="todopage">
        <div class="btn">
        <button id="todo_BackGoal" class="backBtn">
            <i class="ri-arrow-left-line"></i>
            Back
        </button>
        <button id="addtask">
            <i class="ri-add-line"></i>
            Add Task</button>
        </div>
        
        <div class="list" id="taskstore">
   
        </div>
    </div>

<!-- Task Popup -->
<div id="taskModal" class="taskmodal">

    <div class="modal-content">

        <div class="modal-header">
            <h2>Add New Task</h2>

            <button id="closeModal">
                <i class="ri-close-line"></i>
            </button>
        </div>

        <input
            type="text"
            id="taskTitle"
            placeholder="Task Title"
        >

        <textarea
            id="taskDescription"
            placeholder="Task Description"
        ></textarea>

        <button id="saveTask">
            Save Task
        </button>

    </div>

</div>
</div>

<section id="pomodoroPage" class="page">

    <button id="backPomodoro" class="backBtn">
        <i class="ri-arrow-left-line"></i>
        Back
    </button>

    <div class="pomodoro">

        <div class="pomodoro-top">

            <h2>
                <i class="ri-timer-flash-line"></i>
                Focus Timer
            </h2>

            <div class="session">
                Session #1
            </div>

        </div>

        <!-- Mode Buttons -->

        <div class="mode-buttons">

            <button class="mode active" data-time="25">
                🍅 Focus
            </button>

            <button class="mode" data-time="5">
                ☕ Short Break
            </button>

            <button class="mode" data-time="15">
                🌴 Long Break
            </button>

        </div>

        <!-- Timer -->

        <div class="timer-circle">

            <svg width="320" height="320">

                <circle
                    class="bg"
                    cx="160"
                    cy="160"
                    r="130">
                </circle>

                <circle
                    id="progress"
                    class="progress"
                    cx="160"
                    cy="160"
                    r="130">
                </circle>

            </svg>

            <div class="timer-content">

                <span class="timer-label">
                    Focus Time
                </span>

                <h1 id="timer">
                    25:00
                </h1>

                <p id="status">
                    Stay focused 🚀
                </p>

            </div>

        </div>

        <!-- Controls -->

        <div class="controls">

            <button id="startBtn">
                <i class="ri-play-fill"></i>
            </button>

            <button id="pauseBtn">
                <i class="ri-pause-fill"></i>
            </button>

            <button id="resetBtn">
                <i class="ri-refresh-line"></i>
            </button>

        </div>

        <!-- Statistics -->

        <div class="stats">

            <div class="stat card">

                <i class="ri-checkbox-circle-fill"></i>

                <h2 id="completedCount">
                    0
                </h2>

                <p>Completed</p>

            </div>

            <div class="stat card">

                <i class="ri-fire-fill"></i>

                <h2 id="focusTime">
                    0m
                </h2>

                <p>Focus Time</p>

            </div>

            <div class="stat card">

                <i class="ri-award-fill"></i>

                <h2 id="streak">
                    0
                </h2>

                <p>Streak</p>

            </div>

        </div>

    </div>

</section>
    <script src="script.js"></script>
</body>
</html>
